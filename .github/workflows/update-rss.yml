name: Update Fanatical RSS Feeds

on:
  schedule:
    # Every 6 hours, offset from the top of the hour to avoid GitHub's
    # scheduler congestion.
    - cron: '23 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o gofanatical ./cmd/

      - name: Generate RSS feeds
        run: ./gofanatical

      - name: Check for changes
        id: changes
        run: |
          git add docs/
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git commit -m "🤖 Auto-update RSS feeds - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true

      - name: Summary
        run: |
          {
            echo "## RSS Update Summary"
            echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- **Feeds changed**: ${{ steps.changes.outputs.changed }}"
            echo "- **Live site**: https://feuerlord2.github.io/Fanatical-RSS-Site/"
          } >> "$GITHUB_STEP_SUMMARY"
